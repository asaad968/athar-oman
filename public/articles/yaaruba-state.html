  <p>تأسست دولة اليعاربة عام 1624م على يد الإمام ناصر بن مرشد اليعربي، الذي وحّد عُمان وطرد البرتغاليين من سواحلها.</p>
  <h2>الإنجازات</h2>
  <p>بنى اليعاربة أسطولاً بحرياً قوياً امتدّ نفوذه إلى شرق أفريقيا والخليج العربي، وأقاموا نهضة عمرانية واسعة.</p>
