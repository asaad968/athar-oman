  <p>بدأت دولة الإمامة في عُمان مع الجلندى بن مسعود الذي بويع إماماً، ثم تتابع بعده عدد من أئمة العدل في فترات متلاحقة.</p>
  <h2>المبادئ</h2>
  <p>قامت على الشورى والعدل، وكانت من أوائل التجارب السياسية ذات الطابع الإسلامي الخالص في الجزيرة العربية.</p>
