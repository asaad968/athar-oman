<article>
  <p>تأسست دولة البوسعيد على يد الإمام أحمد بن سعيد عام 1744م بعد طرد الفرس من عُمان، وما زالت قائمة حتى اليوم.</p>
  <h2>الامتداد</h2>
  <p>بلغت ذروتها في عهد السيد سعيد بن سلطان حيث امتدت من عُمان إلى زنجبار وسواحل شرق إفريقيا.</p>
