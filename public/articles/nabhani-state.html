<article>
  <p>قامت دولة النباهنة في عُمان منذ القرن السادس الهجري واستمرت قروناً عديدة، وقد عُرف ملوكها بحب الأدب والشعر.</p>
  <h2>نبذة</h2>
  <p>اتخذت بهلا عاصمة لها، وبَنَت فيها قلاعاً وحصوناً لا تزال شاهدة على عظمتها.</p>
  <h2>الحكام</h2>
  <p>من أبرز ملوكها: محمد بن نبهان، وعمر بن نبهان، وسليمان بن سليمان النبهاني.</p>
</article>
